version: '3.8'

services:
  # Development mode
  cars-dev:
    build:
      context: .
      target: development
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
    command: yarn dev --host 0.0.0.0
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5173"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Production mode (оптимизированный)
  cars-prod:
    build:
      context: .
      target: production
      args:
        - VITE_API_BASE_URL=${VITE_API_BASE_URL:-/api}
    ports:
      - "80:80"
    environment:
      - NODE_ENV=production
      - BACKEND_HOST=${BACKEND_HOST:-185.239.50.252:8080}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Production mode (стандартный)
  cars-prod-standard:
    build:
      context: .
      target: production
      args:
        - VITE_API_BASE_URL=${VITE_API_BASE_URL:-/api}
    ports:
      - "8081:80"
    environment:
      - NODE_ENV=production
      - BACKEND_HOST=${BACKEND_HOST:-185.239.50.252:8080}
    restart: unless-stopped