server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA: все пути отдаём через index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Проксирование API: /api/... -> бэкенд получает /api/... (BACKEND_HOST подставляется при старте контейнера)
    location /api/ {
        proxy_pass http://${BACKEND_HOST}/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_connect_timeout 10s;
        proxy_read_timeout 60s;
    }

    # Swagger UI бэкенда: /docs -> http://BACKEND_HOST/docs
    location /docs {
        proxy_pass http://${BACKEND_HOST}/docs;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

}

